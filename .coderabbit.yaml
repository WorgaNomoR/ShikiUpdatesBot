# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit — AI-ревью на каждый PR. Для публичных репозиториев бесплатно (полный Pro).
# Схема: https://docs.coderabbit.ai/reference/configuration
language: "ru"                 # язык комментариев ревью; "en-US" — если нужен английский
tone_instructions: "Кратко и по делу, без воды. Отмечай реальные баги и риски, а не стиль."

reviews:
  profile: assertive           # больше замечаний (замена Codacy); "chill" — мягче
  request_changes_workflow: false   # не блокируем мерж — решает мейнтейнер
  high_level_summary: true
  auto_review:
    enabled: true              # ревью автоматически на каждый PR
    drafts: false              # черновики не трогаем
    base_branches:
      - main
  tools:
    ruff:
      enabled: true            # тот же линтер, что в CI
  path_instructions:
    - path: "tests/**"
      instructions: |
        Тест-дисциплина проекта (проверяй по ней):
        - Мутационная годность: каждый тест обязан падать на сломанном коде.
          Флагай тесты, которые прошли бы и с багом — слабый ассерт (напр.
          «не бросил исключение» без проверки результата), недостижимая ветка
          (тест уходит в early-return до проверяемой логики), холостой мок.
        - Мокать только границы ввода-вывода (сеть, Telegram, ФС, часы).
          Чистые внутренние хелперы НЕ мокать — гонять настоящие.
        - Тесты зеркалят модули: test_<module>.py; оркестратор handlers —
          test_handlers_<flow>.py. Флагай тесты чужого модуля не на месте и
          дубли покрытия между файлами.
        - Стык: тесты модуля X не переспрашивают корректность зависимости Z
          (её матрица «вход→выход» живёт в тесте Z), но обязаны проверять, что X
          верно обрабатывает КОНТРАКТ Z, включая None/пусто/исключение.
    - path: "**/*.py"
      instructions: |
        - Предпочитать минимальные, поведение-сохраняющие правки; флагать
          усложнение без сопоставимой пользы («не переусложнять»).
        - Пользовательские данные из API перед вставкой в HTML-сообщение Telegram
          обязаны экранироваться (h()); иначе < > & ломают разметку (Telegram 400).
        - Новые модули несут SPDX-заголовок GPL-3.0-or-later и copyright.
